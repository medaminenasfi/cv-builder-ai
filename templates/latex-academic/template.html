<div class="cv-root latex-cv">
  <header class="latex-header">
    <h1 class="latex-name">{{fullName}}</h1>
    <p class="latex-contact">{{contactLine}}</p>
  </header>

  <section class="latex-section">
    <h2>{{summaryTitle}}</h2>
    <p class="latex-summary">{{summary}}</p>
  </section>

  <section class="latex-section">
    <h2>{{educationTitle}}</h2>
    {{education}}
  </section>

  <section class="latex-section">
    <h2>{{experienceTitle}}</h2>
    {{experience}}
  </section>

  <section class="latex-section">
    <h2>{{languagesTitle}}</h2>
    <div class="latex-skills">{{languages}}</div>
  </section>

  <section class="latex-section">
    <h2>{{technologiesTitle}}</h2>
    <div class="latex-skills">{{technologies}}</div>
  </section>

  <section class="latex-section">
    <h2>{{skillsTitle}}</h2>
    <div class="latex-skills">{{skills}}</div>
  </section>
</div>
