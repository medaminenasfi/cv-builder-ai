<div class="cv-root">
  <aside class="sidebar">
    <h1>{{fullName}}</h1>
    <p>{{title}}</p>
    <p class="email">{{email}}</p>
    <h2>{{languagesTitle}}</h2>
    {{languages}}
    <h2>{{technologiesTitle}}</h2>
    {{technologies}}
    <h2>{{skillsTitle}}</h2>
    {{skills}}
  </aside>
  <main>
    <section><h2>{{summaryTitle}}</h2><p>{{summary}}</p></section>
    <section><h2>{{educationTitle}}</h2>{{education}}</section>
    <section><h2>{{experienceTitle}}</h2>{{experience}}</section>
    <section><h2>{{projectsTitle}}</h2>{{projects}}</section>
  </main>
</div>
