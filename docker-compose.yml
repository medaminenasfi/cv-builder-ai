services:
  postgres:
    image: postgres:16
    container_name: cvbuilder-postgres
    ports:
      - '55432:5432'
    environment:
      POSTGRES_USER: cvbuilder
      POSTGRES_PASSWORD: cvbuilder
      POSTGRES_DB: cvbuilder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cvbuilder -d cvbuilder']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: cvbuilder-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
